apiVersion: v1
kind: ConfigMap
metadata:
  name: dns-operator-coredns-corefile
  namespace: dns-operator-system
  labels:
    app.kubernetes.io/name: dns-operator
    app.kubernetes.io/component: coredns
data:
  Corefile: |
    .:53 {
        errors
        health :8080
        ready :8181
        reload 5s
    }

    internal.example.test:53 {
        errors
        log
        health :8080
        ready :8181
        reload 5s
        file /etc/coredns/zones/db.internal.example.test internal.example.test
    }
