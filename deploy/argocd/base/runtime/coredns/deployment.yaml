apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-operator-coredns
  namespace: dns-operator-system
  labels:
    app.kubernetes.io/name: dns-operator
    app.kubernetes.io/component: coredns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-operator
      app.kubernetes.io/component: coredns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-operator
        app.kubernetes.io/component: coredns
    spec:
      serviceAccountName: dns-operator-coredns
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coredns
          image: rancher/mirrored-coredns-coredns:1.13.1
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: health
              containerPort: 8080
            - name: ready
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /ready
              port: ready
          livenessProbe:
            httpGet:
              path: /health
              port: health
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: coredns-corefile
              mountPath: /etc/coredns/Corefile
              subPath: Corefile
              readOnly: true
            - name: coredns-zone
              mountPath: /etc/coredns/zones
              readOnly: true
            - name: coredns-tmp
              mountPath: /tmp
      volumes:
        - name: coredns-corefile
          configMap:
            name: dns-operator-coredns-corefile
        - name: coredns-zone
          projected:
            sources:
              - configMap:
                  name: dns-operator-coredns-empty-zone
              - configMap:
                  name: zone-internal-example-test
                  optional: true
        - name: coredns-tmp
          emptyDir: {}
