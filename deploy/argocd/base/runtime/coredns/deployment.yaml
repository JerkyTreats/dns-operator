apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-operator-coredns
  namespace: dns-operator-system
  labels:
    app.kubernetes.io/name: dns-operator
    app.kubernetes.io/component: coredns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-operator
      app.kubernetes.io/component: coredns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-operator
        app.kubernetes.io/component: coredns
    spec:
      containers:
        - name: coredns
          image: rancher/mirrored-coredns-coredns:1.13.1
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: health
              containerPort: 8080
            - name: ready
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /ready
              port: ready
          livenessProbe:
            httpGet:
              path: /health
              port: health
          volumeMounts:
            - name: coredns-corefile
              mountPath: /etc/coredns/Corefile
              subPath: Corefile
              readOnly: true
            - name: coredns-zone
              mountPath: /etc/coredns/zones
              readOnly: true
      volumes:
        - name: coredns-corefile
          configMap:
            name: dns-operator-coredns-corefile
        - name: coredns-zone
          projected:
            sources:
              - configMap:
                  name: dns-operator-coredns-empty-zone
              - configMap:
                  name: zone-internal-example-test
                  optional: true
