name: Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: Force a patch release even with no new commits since last tag
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jerkytreats/dns-operator
  CHART_PATH: charts/dns-operator
  CHART_NAME: dns-operator
  CHART_REGISTRY: oci://ghcr.io/jerkytreats/charts

jobs:
  verify:
    name: Verify
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run tests
        run: make test

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

  release:
    name: Release and publish
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    needs: verify
    concurrency:
      group: release-${{ github.event.repository.default_branch }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    env:
      FORCE_RELEASE: ${{ github.event.inputs.force_release || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Sync to latest default branch state
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch origin "${DEFAULT_BRANCH}" --tags
          git checkout -B release-work "origin/${DEFAULT_BRANCH}"

      - name: Compute next release version
        id: plan
        run: |
          set -euo pipefail

          chart_version="$(sed -n 's/^version: //p' "${CHART_PATH}/Chart.yaml" | head -n1)"
          if [[ -z "${chart_version}" ]]; then
            echo "::error::Unable to read chart version from ${CHART_PATH}/Chart.yaml"
            exit 1
          fi

          parse_version() {
            local value="$1"
            IFS='.' read -r major minor patch <<<"$value"
            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "::error::Invalid semver value: $value"
              exit 1
            fi
            if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
              echo "::error::Non numeric semver value: $value"
              exit 1
            fi
            printf '%s %s %s\n' "$major" "$minor" "$patch"
          }

          last_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)"
          if [[ -z "${last_tag}" ]]; then
            echo "release_required=true" >>"$GITHUB_OUTPUT"
            echo "next_version=${chart_version}" >>"$GITHUB_OUTPUT"
            echo "release_tag=v${chart_version}" >>"$GITHUB_OUTPUT"
            echo "required_bump=bootstrap" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          range_expr="${last_tag}..HEAD"
          required_rank=0
          required_name="none"
          saw_commit=false
          while IFS= read -r sha; do
            saw_commit=true
            subject="$(git log -1 --format=%s "$sha")"
            body="$(git log -1 --format=%b "$sha")"

            if ! grep -Eq '^[a-z]+(\([^)]+\))?(!)?:[[:space:]].+' <<<"$subject"; then
              echo "::error::Commit $sha is not a valid conventional commit: $subject"
              exit 1
            fi

            commit_prefix="${subject%%:*}"
            commit_type="${commit_prefix%%(*}"
            commit_type="${commit_type%%!*}"
            breaking_marker=""
            if [[ "$commit_prefix" == *"!" ]]; then
              breaking_marker="!"
            fi
            case "$commit_type" in
              feat|fix|perf|refactor|docs|design|test|build|ci|chore|policy) ;;
              *)
                echo "::error::Commit $sha uses unsupported type '$commit_type'"
                exit 1
                ;;
            esac

            if [[ "$commit_type" == "policy" ]]; then
              if ! grep -Eq '^(Policy-Ref|Discussion):[[:space:]].+' <<<"$body"; then
                echo "::error::policy commit $sha is missing Policy-Ref or Discussion footer"
                exit 1
              fi
            fi

            if [[ -n "$breaking_marker" ]] || grep -Eq '^BREAKING CHANGE:[[:space:]].+' <<<"$body"; then
              required_rank=3
              required_name="major"
            elif [[ "$required_rank" -lt 2 && "$commit_type" == "feat" ]]; then
              required_rank=2
              required_name="minor"
            elif [[ "$required_rank" -lt 1 ]]; then
              required_rank=1
              required_name="patch"
            fi
          done < <(git rev-list --no-merges "$range_expr")

          if [[ "$saw_commit" != "true" && "$FORCE_RELEASE" == "true" ]]; then
            required_rank=1
            required_name="patch"
          fi

          if [[ "$saw_commit" != "true" && "$FORCE_RELEASE" != "true" ]]; then
            echo "release_required=false" >>"$GITHUB_OUTPUT"
            echo "next_version=${last_tag#v}" >>"$GITHUB_OUTPUT"
            echo "release_tag=${last_tag}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          read -r base_major base_minor base_patch <<<"$(parse_version "${last_tag#v}")"

          effective_rank="$required_rank"
          if [[ "$base_major" == "0" && "$required_rank" -eq 3 ]]; then
            effective_rank=2
            required_name="minor"
          fi

          case "$effective_rank" in
            3)
              next_major=$((base_major + 1))
              next_minor=0
              next_patch=0
              ;;
            2)
              next_major=$base_major
              next_minor=$((base_minor + 1))
              next_patch=0
              ;;
            1)
              next_major=$base_major
              next_minor=$base_minor
              next_patch=$((base_patch + 1))
              ;;
            *)
              echo "::error::Unable to determine required version bump"
              exit 1
              ;;
          esac

          next_version="${next_major}.${next_minor}.${next_patch}"
          echo "release_required=true" >>"$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >>"$GITHUB_OUTPUT"
          echo "release_tag=v${next_version}" >>"$GITHUB_OUTPUT"
          echo "required_bump=${required_name}" >>"$GITHUB_OUTPUT"

      - name: Stop when no release is needed
        if: ${{ steps.plan.outputs.release_required != 'true' }}
        run: |
          set -euo pipefail
          echo "No release needed for current default branch state."

      - name: Apply computed chart metadata
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        run: |
          set -euo pipefail
          next_version="${{ steps.plan.outputs.next_version }}"
          release_tag="${{ steps.plan.outputs.release_tag }}"
          sed -i -E "s/^version: .*/version: ${next_version}/" "${CHART_PATH}/Chart.yaml"
          sed -i -E "s/^appVersion: .*/appVersion: \"${release_tag}\"/" "${CHART_PATH}/Chart.yaml"

      - name: Commit and push release metadata
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        id: bump
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${CHART_PATH}/Chart.yaml"; then
            echo "release_sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          git add "${CHART_PATH}/Chart.yaml"
          git commit -m "ci(release): prepare ${{ steps.plan.outputs.release_tag }} [skip ci]"
          git push origin HEAD:"${DEFAULT_BRANCH}"
          echo "release_sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        env:
          RELEASE_SHA: ${{ steps.bump.outputs.release_sha }}
        run: |
          set -euo pipefail
          release_tag="${{ steps.plan.outputs.release_tag }}"
          git tag "${release_tag}" "${RELEASE_SHA}"
          git push origin "${release_tag}"

      - name: Set up Docker Buildx
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in Helm to GHCR
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Extract image metadata
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.plan.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push image
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build installer bundle
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        run: |
          set -euo pipefail
          make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.plan.outputs.release_tag }}

      - name: Package chart
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p dist/chart
          helm package "${CHART_PATH}" --destination dist/chart

      - name: Push chart
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        run: |
          set -euo pipefail
          helm push dist/chart/${{ env.CHART_NAME }}-${{ steps.plan.outputs.next_version }}.tgz ${{ env.CHART_REGISTRY }}

      - name: Upload installer bundle
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dns-operator-install-${{ steps.plan.outputs.release_tag }}
          path: dist/install.yaml

      - name: Upload chart artifact
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dns-operator-chart-${{ steps.plan.outputs.next_version }}
          path: dist/chart/${{ env.CHART_NAME }}-${{ steps.plan.outputs.next_version }}.tgz

      - name: Create GitHub release
        if: ${{ steps.plan.outputs.release_required == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plan.outputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/install.yaml
            dist/chart/${{ env.CHART_NAME }}-${{ steps.plan.outputs.next_version }}.tgz
